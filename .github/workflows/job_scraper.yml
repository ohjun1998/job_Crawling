name: Automated Job Postings to Discord

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국 시간 오전 9시 자동 실행
  workflow_dispatch: # 수동 실행 가능

jobs:
  scrape_and_notify:
    runs-on: ubuntu-latest

    steps:
    - name: 레포지토리 체크아웃
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas

    - name: 크롤러 실행
      run: python scraper.py

    - name: 디스코드로 CSV 파일 전송
      env:
        # 깃허브 시크릿에 저장한 디스코드 웹훅 주소를 불러옵니다.
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        if [ -f job_results.csv ]; then
          echo "디스코드로 파일 전송 중..."
          curl -X POST \
            -F "file=@job_results.csv" \
            -F "payload_json={\"content\": \"🚀 **오늘의 정보보안 채용공고 수집 결과가 도착했습니다!**\n수집된 채용공고 목록을 CSV 파일로 첨부합니다. 다운로드하여 확인하세요.\"}" \
            $DISCORD_WEBHOOK_URL
        else
          echo "수집된 공고가 없어 알림만 전송합니다."
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"😭 오늘 수집된 보안 분야 채용공고가 없습니다.\"}" \
            $DISCORD_WEBHOOK_URL
        fi

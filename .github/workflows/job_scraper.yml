name: Automated Job Postings Scraper

on:
  schedule:
    # 매일 한국 시간(KST) 오전 9시에 자동 실행 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 깃허브 웹 페이지에서 수동으로 실행하고 싶을 때 사용

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 파일 쓰기 권한 허용

    steps:
    - name: 레포지토리 코드를 런너 환경으로 가져오기
      uses: actions/checkout@v4

    - name: 파이썬(Python) 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas

    - name: 크롤러 실행
      run: python scraper.py

    - name: 변경된 CSV 데이터를 깃허브에 Commit & Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 파일이 생성되었거나 변경되었을 때만 커밋 수행
        if [ -f job_results.csv ]; then
          git add job_results.csv
          git commit -m "Update job postings: $(date +'%Y-%m-%d %H:%M')" || exit 0
          git push
        fi
